services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recon}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: src/Recon.Api/Dockerfile
    depends_on:
      - postgres
      - minio
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__ReconDb: ${RECON_DB:-Host=postgres;Port=5432;Database=recon;Username=postgres;Password=postgres}
    ports:
      - "8080:8080"
    volumes:
      - recon-storage:/var/recon/storage

  worker:
    build:
      context: .
      dockerfile: src/Recon.Worker/Dockerfile
    depends_on:
      - postgres
      - minio
    environment:
      DOTNET_ENVIRONMENT: Docker
      ConnectionStrings__ReconDb: ${RECON_DB:-Host=postgres;Port=5432;Database=recon;Username=postgres;Password=postgres}
    volumes:
      - recon-storage:/var/recon/storage

volumes:
  postgres-data:
  minio-data:
  recon-storage:
