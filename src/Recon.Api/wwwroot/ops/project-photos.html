<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project Photos</title>
<style>
:root{--bg:#f3efe7;--panel:#fffdf8ee;--line:#d9d2c6;--ink:#1f2421;--muted:#5a655e;--accent:#1f6f5f;--soft:#d8ebe6;--ok:#235c48;--warn:#8e3b2f;--pending:#9d7f41}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#f8f4ec 0%,var(--bg) 100%);color:var(--ink);font-family:Georgia,"Times New Roman",serif}
main{max-width:1480px;margin:0 auto;padding:24px 20px}
h1,h2,p{margin:0}
a{color:var(--accent)}
.stack{display:grid;gap:18px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 36px rgba(31,36,33,.06)}
.panel-head{display:flex;justify-content:space-between;gap:12px;align-items:start;padding:18px 18px 12px}
.panel-body{padding:0 18px 18px}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.summary{display:inline-flex;align-items:center;min-height:40px;padding:8px 12px;border-radius:999px;background:var(--soft);color:var(--accent)}
.status{color:var(--muted)} .status.success{color:var(--ok)} .status.error{color:var(--warn)}
.subtle{color:var(--muted);font-size:.92rem}
.grid4,.grid3{display:grid;gap:12px}
.grid4{grid-template-columns:repeat(4,minmax(0,1fr))}
.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}
.card,.detail{border:1px solid var(--line);border-radius:14px;background:#ffffffb8;padding:12px 14px}
.card strong,.detail strong{display:block;margin-bottom:6px;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.value{font-size:1.12rem}
.toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:end}
label{display:grid;gap:6px;font-size:.92rem}
select{min-width:180px;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--ink)}
.button-link{display:inline-flex;align-items:center;min-height:42px;padding:10px 14px;border-radius:999px;background:#e5ddd2;color:var(--ink);text-decoration:none}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.photo-card{overflow:hidden;border:1px solid var(--line);border-radius:16px;background:#fffdf7;box-shadow:0 8px 22px rgba(31,36,33,.05)}
.photo-card a{text-decoration:none;color:inherit}
.thumb{aspect-ratio:4/3;background:linear-gradient(135deg,#ede3d5 0%,#f9f4eb 100%);display:flex;align-items:center;justify-content:center}
.thumb img{display:block;width:100%;height:100%;object-fit:cover}
.thumb.empty{padding:18px;text-align:center;color:var(--muted)}
.photo-body{display:grid;gap:10px;padding:14px}
.meta{display:grid;gap:6px;color:var(--muted);font-size:.9rem}
.pill{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;font-size:.8rem;background:var(--soft);color:var(--accent)}
.pill.failed{background:#8e3b2f22;color:var(--warn)}
.pill.pending{background:#9d7f4122;color:var(--pending)}
.empty{padding:24px 16px;border:1px dashed var(--line);border-radius:14px;text-align:center;color:var(--muted);background:#ffffff80}
@media (max-width:1080px){.grid4,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="stack">
<section class="panel">
<div class="panel-head">
<div>
<h1>Project Photos</h1>
<p>Browse every uploaded or imported photo for the selected project.</p>
</div>
<div class="row">
<a class="button-link" href="/ops/jobs.html">Back To Ops</a>
<div id="summaryPill" class="summary">Loading project...</div>
</div>
</div>
<div class="panel-body stack">
<div class="row">
<div id="statusLine" class="status">Loading project photos...</div>
</div>
<div id="projectCards" class="grid4"></div>
</div>
</section>

<section class="panel">
<div class="panel-head">
<div>
<h2>Photo Gallery</h2>
<p id="galleryCaption">Loading project images.</p>
</div>
<div class="toolbar">
<label>Validation Status
<select id="validationFilter">
<option value="">All images</option>
<option value="Validated">Validated</option>
<option value="Pending">Pending</option>
<option value="Failed">Failed</option>
</select>
</label>
<label>Source Type
<select id="sourceFilter">
<option value="">All sources</option>
<option value="upload">Uploads</option>
<option value="url_import">URL imports</option>
</select>
</label>
</div>
</div>
<div class="panel-body">
<div id="galleryHost" class="empty">Loading images...</div>
</div>
</section>
</main>

<script>
const $=id=>document.getElementById(id);
const summaryPill=$("summaryPill"),statusLine=$("statusLine"),projectCards=$("projectCards"),galleryCaption=$("galleryCaption"),galleryHost=$("galleryHost"),validationFilter=$("validationFilter"),sourceFilter=$("sourceFilter");
const params=new URLSearchParams(window.location.search);
const projectId=params.get("projectId");
let currentProject=null,projectImages=[];

function esc(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
function fmtDate(v){if(!v)return"None";const d=new Date(v);return Number.isNaN(d.getTime())?v:d.toLocaleString()}
function fmtSize(v){if(v==null)return"Unknown";const units=["B","KB","MB","GB"];let size=v,unit=0;while(size>=1024&&unit<units.length-1){size/=1024;unit++}return `${size.toFixed(size>=10||unit===0?0:1)} ${units[unit]}`}
function setStatus(message,state){statusLine.textContent=message;statusLine.className=state?`status ${state}`:"status"}
async function readErr(r){try{const b=await r.json();return b.detail||b.title||`HTTP ${r.status}`}catch{return`HTTP ${r.status}`}}
async function fetchJson(url){const r=await fetch(url,{headers:{Accept:"application/json"}});if(!r.ok)throw new Error(await readErr(r));return r.status===204?null:await r.json()}
function imageHref(image,variant="original"){return `/api/v1/projects/${encodeURIComponent(projectId)}/images/${encodeURIComponent(image.id)}/content?variant=${encodeURIComponent(variant)}`}
function validationClass(status){if(status==="Validated")return"";if(status==="Failed")return"failed";return"pending"}

function renderProjectCards(){
  if(!currentProject){
    projectCards.innerHTML="";
    return;
  }
  projectCards.innerHTML=`<div class="card"><strong>Project</strong><div class="value">${esc(currentProject.name)}</div></div>
  <div class="card"><strong>Status</strong><div class="value">${esc(currentProject.status)}</div></div>
  <div class="card"><strong>Images</strong><div class="value">${currentProject.validImageCount}/${currentProject.totalImageCount} valid</div></div>
  <div class="card"><strong>Latest Run</strong><div class="value">${currentProject.latestRun?esc(currentProject.latestRun.status):"None"}</div></div>
  <div class="detail"><strong>Project Id</strong>${esc(currentProject.id)}</div>
  <div class="detail"><strong>Updated</strong>${esc(fmtDate(currentProject.updatedAtUtc))}</div>
  <div class="detail"><strong>Description</strong>${currentProject.description?esc(currentProject.description):"None"}</div>
  <div class="detail"><strong>Open Original API</strong><a href="/api/v1/projects/${encodeURIComponent(currentProject.id)}/images" target="_blank" rel="noopener">List image metadata</a></div>`;
}

function renderGallery(){
  if(!projectId){
    summaryPill.textContent="Missing project id";
    galleryCaption.textContent="No project selected.";
    galleryHost.className="empty";
    galleryHost.textContent="A project id query parameter is required.";
    return;
  }

  const validationStatus=validationFilter.value;
  const sourceType=sourceFilter.value;
  const filtered=projectImages.filter(image=>(!validationStatus||image.validationStatus===validationStatus)&&(!sourceType||image.sourceType===sourceType));
  summaryPill.textContent=`${filtered.length} photo${filtered.length===1?"":"s"} shown`;
  galleryCaption.textContent=currentProject?`Showing ${filtered.length} photo${filtered.length===1?"":"s"} for ${currentProject.name}.`:`Showing ${filtered.length} project photo${filtered.length===1?"":"s"}.`;

  if(filtered.length===0){
    galleryHost.className="empty";
    galleryHost.textContent="No images match the current filters.";
    return;
  }

  galleryHost.className="gallery";
  galleryHost.innerHTML=filtered.map(image=>`<article class="photo-card">
    <a href="${imageHref(image)}" target="_blank" rel="noopener">
      <div class="thumb">
        <img src="${imageHref(image,"thumbnail")}" alt="${esc(image.originalFileName)}" loading="lazy" />
      </div>
    </a>
    <div class="photo-body">
      <div>
        <strong>${esc(image.originalFileName)}</strong><br>
        <span class="subtle">${esc(image.id)}</span>
      </div>
      <div class="row">
        <span class="pill ${validationClass(image.validationStatus)}">${esc(image.validationStatus)}</span>
        <span class="pill">${image.isValidImage?"Valid":"Needs review"}</span>
      </div>
      <div class="meta">
        <div>Source: ${esc(image.sourceType)}</div>
        <div>Type: ${esc(image.mimeType)}</div>
        <div>Size: ${esc(fmtSize(image.fileSizeBytes))}</div>
        <div>Dimensions: ${image.width&&image.height?esc(`${image.width} x ${image.height}`):"Unknown"}</div>
        <div>Imported From: ${image.sourceUrl?`<a href="${esc(image.sourceUrl)}" target="_blank" rel="noopener">Source URL</a>`:"Direct upload"}</div>
      </div>
      <div><a href="${imageHref(image)}" target="_blank" rel="noopener">Open full image</a></div>
    </div>
  </article>`).join("");
}

async function loadPage(){
  try{
    if(!projectId)throw new Error("Missing project id.");
    const [project,images]=await Promise.all([
      fetchJson(`/api/v1/projects/${encodeURIComponent(projectId)}`),
      fetchJson(`/api/v1/projects/${encodeURIComponent(projectId)}/images`)
    ]);
    currentProject=project;
    projectImages=Array.isArray(images)?images:[];
    renderProjectCards();
    renderGallery();
    setStatus("Loaded project photos.","success");
  }catch(error){
    summaryPill.textContent="Load failed";
    projectCards.innerHTML="";
    galleryCaption.textContent="The project photos could not be loaded.";
    galleryHost.className="empty";
    galleryHost.textContent=error.message||"Load failed.";
    setStatus(error.message||"Load failed.","error");
  }
}

validationFilter.addEventListener("change",renderGallery);
sourceFilter.addEventListener("change",renderGallery);
loadPage();
</script>
</body>
</html>
